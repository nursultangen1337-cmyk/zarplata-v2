<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Заправка ⛽</title>
<meta name="theme-color" content="#0d1117">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --border:#30363d;--border2:#444c56;
  --green:#3fb950;--greenDim:#1a3a22;--greenBg:#0d2818;
  --amber:#d29922;--amberDim:#3a2a00;
  --red:#f85149;--redDim:#3a1210;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 16px 14px;text-align:center}
.header-icon{font-size:36px;margin-bottom:6px}
.header-title{font-size:20px;font-weight:700;color:var(--amber)}
.header-sub{font-size:12px;color:var(--text3);margin-top:2px}
.content{flex:1;padding:20px 16px;overflow-y:auto;padding-bottom:40px}
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.form-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text2);font-weight:500;margin-bottom:7px}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:18px;padding:13px 14px;outline:none;transition:border .15s;font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--amber)}
.field select option{background:var(--bg3)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:16px;border-radius:var(--radius-sm);font-size:17px;font-weight:700;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-amber{background:var(--amber);color:#0d1117}
.vehicle-chip{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:15px;cursor:pointer;margin:0 8px 10px 0;transition:all .15s;font-weight:500}
.vehicle-chip.selected{background:var(--amberDim);border-color:var(--amber);color:var(--amber)}
.section-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin:20px 0 10px}
.entry-item{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:8px;gap:12px}
.entry-icon{width:40px;height:40px;border-radius:10px;background:var(--amberDim);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.entry-info{flex:1}
.entry-name{font-size:14px;font-weight:600;color:var(--text)}
.entry-date{font-size:12px;color:var(--text3)}
.entry-liters{font-size:18px;font-weight:700;color:var(--amber);flex-shrink:0}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:16px;color:var(--text2);font-weight:600;margin-bottom:6px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--amberDim);border:1px solid var(--amber);color:var(--amber);padding:12px 22px;border-radius:20px;font-size:14px;font-weight:600;z-index:300;opacity:0;transition:opacity .2s;white-space:nowrap}
.toast.show{opacity:1}
.money-fly{position:fixed;z-index:400;font-size:26px;font-weight:800;color:var(--amber);pointer-events:none;animation:moneyFly 1.2s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes moneyFly{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-80px) scale(1.4)}100%{opacity:0;transform:translateY(-160px) scale(.7)}}
.no-vehicles{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;color:var(--text2);font-size:14px;line-height:1.7}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px}
.stat-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700;color:var(--amber)}
.driver-chip{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg3);border:1.5px solid var(--border);border-radius:20px;font-size:15px;cursor:pointer;margin:0 8px 10px 0;font-weight:500;color:var(--text);min-height:48px}
.driver-chip.selected{background:#1a3a22;border-color:#3fb950;color:#3fb950}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">⛽</div>
  <div class="header-title">Облік пального</div>
  <div class="header-sub" id="farm-name">ФГ ПРО-АГРО</div>
</div>

<div class="content">

  <div id="no-vehicles-msg" class="no-vehicles" style="display:none">
    ⚠️ Транспорт ще не додано.<br>Зверніться до керівника для налаштування.
  </div>

  <div id="main-form">
    <div class="form-card">
      <div class="form-title">Нова заправка</div>
      <div class="field">
        <label>Хто заправляє</label>
        <div id="driver-worker-chips" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">
          <div style="color:var(--text3);font-size:13px">Завантаження...</div>
        </div>
      </div>
      <div class="field">
        <label>Оберіть транспорт</label>
        <div id="vehicle-chips"></div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Літрів заправлено</label>
          <input type="number" id="fuel-liters" placeholder="0.0" inputmode="decimal" step="0.1" min="0">
        </div>
        <div class="field">
          <label>Дата</label>
          <input type="date" id="fuel-date">
        </div>
      </div>
      <div class="field">
        <label>Примітка</label>
        <input type="text" id="fuel-note" placeholder="Де заправлявся, маршрут...">
      </div>
      <button class="btn btn-amber" onclick="addEntry()">⛽ Записати заправку</button>
    </div>

    <div class="stat-row" id="stat-row">
      <div class="stat-box"><div class="stat-label">Цього місяця</div><div class="stat-val" id="stat-month">0 л</div></div>
      <div class="stat-box"><div class="stat-label">Заправок</div><div class="stat-val" id="stat-count">0</div></div>
    </div>

    <div class="section-label">Мої останні заправки</div>
    <div id="entries-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// Firebase (той самий конфіг що в index.html)
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDQUd7iF1kQdUEoJ4yK_8mzl3UuZIcNBIY",
  authDomain: "zarplata-275f9.firebaseapp.com",
  databaseURL: "https://zarplata-275f9-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "zarplata-275f9",
  storageBucket: "zarplata-275f9.firebasestorage.app",
  messagingSenderId: "61739415470",
  appId: "1:61739415470:web:f050a9bf6ba2f1ad4d3a3f"
};

let db, fbDB = null, firebaseReady = false;
let state = {vehicles:[], fuelEntries:[], workers:[]};
let selectedVehicle = null;
let selectedDriverWorker = null;

function initFirebase(){
  try{
    if(FIREBASE_CONFIG.apiKey==='ВСТАВТЕ_API_KEY') return;
    firebase.initializeApp(FIREBASE_CONFIG);
    fbDB = firebase.database();
    firebaseReady = true;
    fbDB.ref('zarplata_data').on('value', snap=>{
      const data=snap.val();
      if(data){
        state.vehicles = data.vehicles||[];
        state.fuelEntries = data.fuelEntries||[];
        state.workers = data.workers||[];
        if(!state.vehicles.length){
          document.getElementById('no-vehicles-msg').style.display='block';
          document.getElementById('main-form').style.display='none';
        } else {
          document.getElementById('no-vehicles-msg').style.display='none';
          document.getElementById('main-form').style.display='block';
          renderChips();renderWorkerChips();renderEntries();renderStats();
        }
      }
    });
  }catch(e){ firebaseReady=false; }
}

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('zarplata',2);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('data'))d.createObjectStore('data');
    };
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=()=>rej();
  });
}
function dbGet(key){
  return new Promise(res=>{
    if(!db){res(null);return;}
    const tx=db.transaction('data','readonly');
    const req=tx.objectStore('data').get(key);
    req.onsuccess=()=>res(req.result||null);
    req.onerror=()=>res(null);
  });
}
function dbSet(key,val){
  return new Promise(res=>{
    if(!db){res();return;}
    const tx=db.transaction('data','readwrite');
    tx.objectStore('data').put(val,key);
    tx.oncomplete=()=>res();
    tx.onerror=()=>res();
  });
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtMonth(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function displayDate(ds){const[y,m,d]=ds.split('-');return d+'.'+m+'.'+y;}
function getMonthStr(ds){return ds.slice(0,7);}

function load(){
  initFirebase();
  document.getElementById('fuel-date').value=fmtDate(new Date());
  if(!firebaseReady){
    // Fallback до локальної бази
    openDB().then(()=>dbGet('zarplata_v3')).then(raw=>{
      if(raw){
        state.vehicles=raw.vehicles||[];
        state.fuelEntries=raw.fuelEntries||[];
        state.workers=raw.workers||[];
      }
      if(!state.vehicles.length){
        document.getElementById('no-vehicles-msg').style.display='block';
        document.getElementById('main-form').style.display='none';
      } else {
        renderChips();renderWorkerChips();renderEntries();renderStats();
      }
    });
  }
}

function save(){
  if(firebaseReady && fbDB){
    // Читаємо поточний стан з Firebase і оновлюємо тільки fuelEntries
    fbDB.ref('zarplata_data/fuelEntries').set(state.fuelEntries);
  } else {
    dbGet('zarplata_v3').then(raw=>{
      const full=raw||{};
      full.fuelEntries=state.fuelEntries;
      dbSet('zarplata_v3',full);
    });
  }
}

function renderChips(){
  const el=document.getElementById('vehicle-chips');
  el.innerHTML=state.vehicles.map(v=>`
    <div class="vehicle-chip ${selectedVehicle===v.id?'selected':''}" onclick="selectVehicle('${v.id}')">
      ${v.type.split(' ')[0]} ${v.name}
    </div>`).join('');
}
function selectVehicle(id){selectedVehicle=(selectedVehicle===id)?null:id;renderChips();}

function renderWorkerChips(){
  const el=document.getElementById('driver-worker-chips');
  if(!el)return;
  if(!state.workers||!state.workers.length){
    el.innerHTML='<div style="color:var(--text3);font-size:13px">Немає працівників</div>';
    return;
  }
  el.innerHTML=state.workers.map(function(w){
    var sel=selectedDriverWorker===w.id;
    var parts=[];
    var wid=w.id;
    parts.push('<div onclick="selectDriverWorker(\'' + wid + '\')" ');
    parts.push('class="driver-chip'+(sel?' selected':'')+'"');
    parts.push('>');
    parts.push('<div style="width:28px;height:28px;border-radius:50%;background:'+(sel?'#0d2818':'var(--bg4)')+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:'+(sel?'#3fb950':'var(--text2)')+'">');
    parts.push((w.last[0]||'')+(w.first[0]||''));
    parts.push('</div>');
    parts.push(w.last+' '+w.first+(sel?' ✓':''));
    parts.push('</div>');
    return parts.join('');
  }).join('');
}
function selectDriverWorker(id){
  selectedDriverWorker=(selectedDriverWorker===id)?null:id;
  renderWorkerChips();
}

function addEntry(){
  if(!selectedVehicle){showToast('Оберіть транспорт');return;}
  const liters=parseFloat(document.getElementById('fuel-liters').value);
  const date=document.getElementById('fuel-date').value;
  const note=document.getElementById('fuel-note').value.trim();
  if(!liters||liters<=0){showToast('Введіть кількість літрів');return;}
  if(!date){showToast('Вкажіть дату');return;}
  const entry={id:uid(),vehicleId:selectedVehicle,liters,date,note};
  if(selectedDriverWorker) entry.driverId=selectedDriverWorker;
  state.fuelEntries.push(entry);
  save();
  const v=state.vehicles.find(vv=>vv.id===selectedVehicle);
  const w=selectedDriverWorker?state.workers.find(ww=>ww.id===selectedDriverWorker):null;
  flyFuel(liters);
  document.getElementById('fuel-liters').value='';
  document.getElementById('fuel-note').value='';
  showToast('✓ '+(v?v.name:'')+' — '+liters+' л'+(w?' ('+w.last+')':''));
  if(navigator.vibrate)navigator.vibrate([40,20,60]);
  renderEntries();renderStats();
}

function renderEntries(){
  const el=document.getElementById('entries-list');
  const entries=state.fuelEntries.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,15);
  if(!entries.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">⛽</div><div class="empty-title">Ще немає заправок</div><div class="empty-text">Додайте першу вище</div></div>';
    return;
  }
  el.innerHTML=entries.map(f=>{
    const v=state.vehicles.find(vv=>vv.id===f.vehicleId);
    const icon=v?v.type.split(' ')[0]:'🚗';
    const dw=f.driverId?state.workers.find(ww=>ww.id===f.driverId):null;
    return `<div class="entry-item">
      <div class="entry-icon">${icon}</div>
      <div class="entry-info">
        <div class="entry-name">${v?v.name:'—'}${dw?' <span style="font-size:11px;color:var(--text3)">· '+dw.last+'</span>':''}</div>
        <div class="entry-date">${displayDate(f.date)}${f.note?' · '+f.note:''}</div>
      </div>
      <div class="entry-liters">${f.liters.toFixed(1)} л</div>
    </div>`;
  }).join('');
}

function renderStats(){
  const now=fmtMonth(new Date());
  const monthE=state.fuelEntries.filter(f=>getMonthStr(f.date)===now);
  const totalL=monthE.reduce((a,f)=>a+f.liters,0);
  document.getElementById('stat-month').textContent=totalL.toFixed(1)+' л';
  document.getElementById('stat-count').textContent=monthE.length;
}

function flyFuel(liters){
  const btn=document.querySelector('.btn-amber');
  if(!btn)return;
  const rect=btn.getBoundingClientRect();
  const el=document.createElement('div');
  el.className='money-fly';
  el.textContent='+'+liters.toFixed(1)+' л ⛽';
  el.style.left=(rect.left+rect.width/2)+'px';
  el.style.top=rect.top+'px';
  el.style.transform='translateX(-50%)';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1400);
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

load();
</script>
</body>
</html>
